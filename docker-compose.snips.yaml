services:
  playwright-service:
    environment:
      ALLOW_LOCAL_WEBHOOKS: "true"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  api:
    environment:
      ALLOW_LOCAL_WEBHOOKS: "true"
      TEST_SUITE_SELF_HOSTED: "true"
      TEST_SUITE_WEBSITE: http://test-site:4321
      FIRE_ENGINE_BETA_URL: ""
      PLAYWRIGHT_MICROSERVICE_URL: http://playwright-service:3000/scrape
      BROWSER_SERVICE_URL: http://playwright-service:3000
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      nuq-postgres:
        condition: service_healthy
      playwright-service:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3002/e2e-test').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 15s

  redis:
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

  nuq-postgres:
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U postgres -d postgres -h 127.0.0.1",
        ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  test-site:
    build: apps/test-site
    profiles:
      - snips
    networks:
      - backend
    ports:
      - "4321:4321"
    command: sh -lc "pnpm build && pnpm preview --host 0.0.0.0 --port 4321 --strictPort"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:4321/').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
        compress: "true"
